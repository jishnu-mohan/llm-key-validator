name: Python Release

on:
  push:
    tags:
      # Distinct from the npm release tag (`v*`) so the two packages
      # release independently. npm: `git tag v1.0.1`; PyPI: `git tag py-v1.0.1`.
      - "py-v*"

defaults:
  run:
    working-directory: python

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # OIDC token for PyPI Trusted Publishing (no stored secret)
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check . && ruff format --check .
      - name: Type-check (mypy --strict)
        run: mypy src/llm_key_validator
      - name: Tests
        run: pytest -v
      - name: Build distributions
        run: python -m build
      - name: Twine check
        run: twine check dist/*
      # No password/token — Trusted Publishing uses the OIDC token granted by
      # `id-token: write` above. Register the trusted publisher once at:
      # https://pypi.org/manage/project/llm-key-validator/settings/publishing/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
