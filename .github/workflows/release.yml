name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted Publishing requires npm >= 11.5.1; Node 22 ships with npm 10.
      - run: npm install --global npm@latest
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # No NODE_AUTH_TOKEN — Trusted Publishing uses OIDC via the
      # `id-token: write` permission above. Configure the trusted publisher at:
      # https://www.npmjs.com/package/llm-key-validator/access
      - run: npm publish --provenance --access public
